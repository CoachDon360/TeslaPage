<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0a2f69">
  <title>AtMOUSEpheres</title>
  <link rel="stylesheet" href="atmousepheres.css">
</head>
<body>
  <main class="page-shell">
    <section class="artboard" aria-label="AtMOUSEpheres Disney audio menu">
      <img
        class="artwork"
        src="atmousepheres-final.png"
        alt="AtMOUSEpheres Disney audio menu with eight themed categories"
      >

      <nav class="card-links" aria-label="AtMOUSEpheres categories">
        <button class="card card-parks"
          data-title="Around the Parks"
          data-subtitle="Music from around the Disney Parks"
          data-icon="🚂"
          aria-label="Around the Parks"></button>

        <button class="card card-resorts"
          data-title="Resort Collection"
          data-subtitle="Relaxing music from Disney Resort Hotels"
          data-icon="🌴"
          aria-label="Resort Collection"></button>

        <button class="card card-epcot"
          data-title="EPCOT"
          data-subtitle="Music and atmosphere from EPCOT"
          data-icon="🌐"
          aria-label="EPCOT"></button>

        <button class="card card-atmospheres"
          data-title="Park Atmospheres"
          data-subtitle="Relaxing background music from the Parks"
          data-icon="🌳"
          aria-label="Park Atmospheres"></button>

        <button class="card card-classic"
          data-title="Classic Attractions"
          data-subtitle="Classic Disney attraction audio including Space Mountain"
          data-icon="🚀"
          aria-label="Classic Attractions"></button>

        <button class="card card-loops"
          data-title="Disney Loops"
          data-subtitle="Timeless Disney music and melodies"
          data-icon="♫"
          aria-label="Disney Loops"></button>

        <button class="card card-night"
          data-title="Nighttime Spectaculars"
          data-subtitle="Fireworks, parades and nighttime magic"
          data-icon="✦"
          aria-label="Nighttime Spectaculars"></button>

        <button class="card card-seasonal"
          data-title="Seasonal Magic"
          data-subtitle="Holiday music and seasonal celebration"
          data-icon="❄"
          aria-label="Seasonal Magic"></button>
      </nav>

      <section class="functional-player" aria-label="Audio player">
        <button id="previousButton" class="control previous" aria-label="Previous selection"></button>
        <button id="playButton" class="control play" aria-label="Play"></button>
        <button id="nextButton" class="control next" aria-label="Next selection"></button>

        <label class="volume-hitbox">
          <span class="sr-only">Volume</span>
          <input id="volumeSlider" type="range" min="0" max="100" value="55" aria-label="Volume">
        </label>

        <button id="homeButton" class="control home" aria-label="Return home"></button>
      </section>

      <div class="selection-overlay" aria-live="polite">
        <span class="eyebrow">NOW ENTERING...</span>
        <strong id="selectionTitle">Classic Attractions</strong>
        <small id="selectionSubtitle">Classic Disney attraction audio including Space Mountain</small>
      </div>

      <div class="focus-ring" id="focusRing" aria-hidden="true"></div>
      <div class="toast" id="toast" aria-live="polite"></div>

      <audio id="audioPlayer" preload="none"></audio>
    </section>
  </main>

  <script src="atmousepheres.js"></script>
</body>
</html>
