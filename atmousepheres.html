<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#4eb9f2">
  <title>AtMOUSEpheres</title>
  <link rel="stylesheet" href="atmousepheres.css">
</head>
<body>
  <main class="page">
    <section class="artboard" aria-label="AtMOUSEpheres Disney audio menu">
      <img
        class="background-art"
        src="atmousepheres-background.png"
        alt="AtMOUSEpheres with eight Disney-inspired audio categories"
      >

      <nav class="hotspots" aria-label="Audio categories">
        <a class="hotspot parks" href="#" data-name="Around the Parks" aria-label="Around the Parks"></a>
        <a class="hotspot resorts" href="#" data-name="Resort Collection" aria-label="Resort Collection"></a>
        <a class="hotspot epcot" href="#" data-name="EPCOT Promenade" aria-label="EPCOT Promenade"></a>
        <a class="hotspot atmospheres" href="#" data-name="Park Atmospheres" aria-label="Park Atmospheres"></a>
        <a class="hotspot attractions" href="#" data-name="Attraction Adventures" aria-label="Attraction Adventures"></a>
        <a class="hotspot loops" href="#" data-name="Disney Loops" aria-label="Disney Loops"></a>
        <a class="hotspot nighttime" href="#" data-name="Nighttime Spectaculars" aria-label="Nighttime Spectaculars"></a>
        <a class="hotspot seasonal" href="#" data-name="Seasonal Magic" aria-label="Seasonal Magic"></a>
      </nav>

      <div class="status" id="status" aria-live="polite"></div>
    </section>
  </main>

  <script src="atmousepheres.js"></script>
</body>
</html>
