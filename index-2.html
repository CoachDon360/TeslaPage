<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#05070a">
<title>Live Radio</title>
<style>
:root{
  --blue:#0094e1;
  --bg:#04070b;
  --panel:#07111c;
  --line:#233143;
  --muted:#a8b4c5;
  --accent:#ff8c16;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif
}
button,a,input{font:inherit}
.shell{
  height:100vh;display:grid;grid-template-rows:98px 1fr 112px;
  background:radial-gradient(circle at 78% 8%,#0a2345 0,#071523 27%,#04070b 68%)
}
.topbar{
  display:grid;grid-template-columns:108px 1fr 190px;align-items:center;
  padding:12px 18px;border-bottom:1px solid var(--line);background:rgba(3,8,14,.97)
}
.home{
  width:90px;height:72px;border-radius:15px;background:linear-gradient(145deg,#159df3,#0863aa);
  border:1px solid #52b7ff;color:white;text-decoration:none;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-weight:800;box-shadow:0 8px 24px #0008
}
.home-icon{font-size:27px;line-height:1}
.home span:last-child{font-size:12px;margin-top:6px}
.brand{font-size:36px;font-weight:850;letter-spacing:-1px}
.datetime{text-align:right}.clock{font-size:31px;font-weight:800}.date{font-size:15px;color:var(--muted);margin-top:4px}

.layout{min-height:0;display:grid;grid-template-columns:34% 66%;gap:12px;padding:12px 14px 10px}
.station-pane,.now-pane{
  min-height:0;border:1px solid #2a3a4f;border-radius:18px;background:rgba(4,12,21,.93);overflow:hidden
}
.station-pane{overflow-y:auto;padding:9px 10px 18px;scrollbar-width:thin}
.station-pane h2{
  margin:10px 12px 7px;color:#fff;font-size:27px;line-height:1;font-weight:900;letter-spacing:.25px
}
.station-list{border-top:1px solid var(--line)}
.station-row{
  width:100%;min-height:60px;border:0;border-bottom:1px solid #1d2c3c;background:transparent;color:white;
  display:block;padding:7px 12px 7px 16px;text-align:left;cursor:pointer
}
.station-row.active{
  background:linear-gradient(90deg,#093764,#081d31);box-shadow:inset 0 0 0 1px var(--blue);
  border-radius:10px
}
.station-copy{min-width:0;display:block}
.station-name{
  display:block;font-size:19px;font-weight:900;line-height:1;color:var(--station-color,#fff);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 3px 12px #000
}
.station-desc{
  display:block;font-size:14px;color:#c0c9d6;margin-top:5px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis
}
.playing-mark{display:none;margin-right:7px;color:#22aaff}
.station-row.active .playing-mark{display:inline}

.now-pane{padding:28px 38px;display:flex;flex-direction:column}
.now-header{display:flex;align-items:center}
.now-header>span{
  background:linear-gradient(145deg,#0c69b5,#062f62);border:1px solid #0d7fd2;color:#fff;
  border-radius:8px;padding:8px 13px;font-size:16px;font-weight:850;letter-spacing:.5px
}
.display-station{
  font-size:clamp(42px,5vw,76px);font-weight:950;color:var(--accent);margin-top:22px;
  line-height:1;text-shadow:0 5px 18px #000
}
.display-description{font-size:clamp(20px,2.2vw,31px);color:#bdc8d7;margin-top:11px}

.metadata-main{
  flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;
  padding:18px 0 12px;max-width:900px
}
.meta-block{margin-bottom:31px}
.label{color:#19a9ff;font-size:18px;font-weight:700;letter-spacing:.2px;text-transform:none}
.artist,.song,.station-meta{
  font-size:clamp(29px,3.2vw,48px);font-weight:800;line-height:1.1;margin-top:10px;overflow-wrap:anywhere
}
.station-meta{font-size:clamp(26px,2.8vw,42px)}
.wave{
  height:84px;display:flex;align-items:center;justify-content:center;gap:6px;
  width:min(72%,620px);opacity:.76;margin:8px 0 0 12px
}
.wave span{
  width:5px;background:#0999f2;border-radius:5px;box-shadow:0 0 12px #087ac8;
  animation:wave 1.25s ease-in-out infinite
}
.wave span:nth-child(2n){animation-delay:.14s}
.wave span:nth-child(3n){animation-delay:.28s}
.wave span:nth-child(4n){animation-delay:.42s}
@keyframes wave{0%,100%{height:13px}50%{height:70px}}

.player{
  display:grid;grid-template-columns:86px minmax(220px,1fr) 290px minmax(180px,1fr);
  gap:16px;align-items:center;padding:10px 18px;border-top:1px solid #2b3d52;
  background:rgba(5,14,24,.98)
}
.mini-art{
  width:78px;height:78px;border-radius:12px;background:linear-gradient(145deg,#0b1b2a,#06101b);
  border:1px solid #31455d;display:flex;align-items:center;justify-content:center;text-align:center;
  font-size:18px;font-weight:850;color:var(--accent);opacity:.9
}
.mini-copy{min-width:0}.mini-label{font-size:12px;color:#1aabff;font-weight:850;letter-spacing:.7px}
.mini-copy strong,.mini-copy span{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-copy strong{font-size:21px;margin-top:4px}.mini-copy span{font-size:16px;color:#25aef6;margin-top:3px}
.transport{display:flex;justify-content:center;gap:18px}
.transport button{
  width:58px;height:58px;border-radius:50%;border:1px solid #51647b;background:#0b1a29;color:white;font-size:23px
}
.transport .play{
  width:72px;height:72px;border:2px solid #00a2ff;box-shadow:0 0 18px #008fe555;font-size:28px
}
.volume{display:flex;align-items:center;gap:11px}.volume input{width:100%;accent-color:#11a7ff}

@media(max-width:900px){
  .shell{grid-template-rows:86px 1fr 108px}
  .topbar{grid-template-columns:88px 1fr 135px;padding:8px}
  .home{width:74px;height:64px}.brand{font-size:29px}.clock{font-size:25px}
  .layout{grid-template-columns:42% 58%;gap:7px;padding:7px}
  .station-pane h2{font-size:23px}
  .station-row{min-height:57px;padding-left:10px}.station-name{font-size:17px}.station-desc{font-size:12px}
  .now-pane{padding:20px}.display-station{font-size:40px}.display-description{font-size:20px}
  .meta-block{margin-bottom:20px}.wave{width:90%;height:60px}
  .player{grid-template-columns:68px 1fr 230px}.mini-art{width:62px;height:62px}.volume{display:none}
}


/* v1.2 Safari stability */
.metadata-main{
  display:grid;
  grid-template-rows:104px 132px 96px 72px;
  align-content:center;
}
.meta-block{
  margin-bottom:0;
  min-height:0;
}
.artist,.song,.station-meta{
  min-height:1.2em;
  display:block;
}
.wave{
  animation:none !important;
}
.wave span{
  animation:none !important;
  height:28px;
}
.wave span:nth-child(2n){height:50px}
.wave span:nth-child(3n){height:36px}
.wave span:nth-child(4n){height:62px}

@media(max-width:900px){
  .metadata-main{
    grid-template-rows:82px 104px 76px 54px;
  }
}

/* =========================================================
   v1.3 — approved UI corrections
   ========================================================= */

/* Right-side station title is 30% smaller than v1.2. */
.display-station{
  font-size:clamp(29px,3.5vw,53px);
}

/*
  Safari metadata stability:
  fixed grid tracks prevent artist/song length changes from moving
  the Station line or waveform up and down.
*/
.now-pane,
.metadata-main,
.meta-block,
.artist,
.song,
.station-meta{
  min-width:0;
}

.metadata-main{
  flex:none;
  height:404px;
  grid-template-rows:104px 132px 96px 72px;
  align-self:stretch;
  contain:layout;
  overflow:hidden;
}

.meta-block{
  overflow:hidden;
}

.artist,.song,.station-meta{
  overflow:hidden;
  max-height:2.2em;
  transition:none !important;
  animation:none !important;
  transform:none !important;
}

.station-meta{
  max-height:1.2em;
}

.wave,
.wave span{
  transition:none !important;
  animation:none !important;
  transform:none !important;
}

@media(max-width:900px){
  .display-station{
    font-size:28px;
  }
  .metadata-main{
    height:316px;
    grid-template-rows:82px 104px 76px 54px;
  }
}



/* =========================================================
   v1.4 — metadata alignment and hierarchy
   ========================================================= */

/* Anchor every metadata element to the left edge. */
.metadata-main{
  width:100%;
  max-width:none;
  justify-items:start;
  text-align:left;
}

.meta-block{
  width:100%;
  text-align:left;
}

.label,
.artist,
.song,
.station-meta{
  width:100%;
  text-align:left;
  justify-self:start;
}

/* Metadata values are approximately 20% smaller than the station title. */
.artist,
.song,
.station-meta{
  font-size:clamp(23px,2.8vw,42px);
}

/* Keep the decorative waveform aligned with the metadata instead of centered. */
.wave{
  justify-content:flex-start;
  margin-left:0;
}

@media(max-width:900px){
  .artist,
  .song,
  .station-meta{
    font-size:22px;
  }
}

/* =========================================================
   v1.5 — true metadata shift + waveform removal
   ========================================================= */

/*
  The text was already left-aligned inside its own container.
  This moves the metadata container itself 28px left while
  leaving the station title and description in their positions.
*/
.metadata-main{
  position:relative;
  left:-28px;
  width:calc(100% + 28px);
  height:332px;
  grid-template-rows:104px 132px 96px;
  overflow:hidden;
}

/* The waveform has been removed from radio.html. */
.wave{
  display:none !important;
}

@media(max-width:900px){
  .metadata-main{
    left:-12px;
    width:calc(100% + 12px);
    height:262px;
    grid-template-rows:82px 104px 76px;
  }
}



/* =========================================================
   v1.7 — surgical metadata cleanup
   Only requested changes:
   1) one line of space after channel description
   2) Station metadata block removed
   ========================================================= */

.display-description{
  margin-bottom:28px;
}

.metadata-main{
  height:236px;
  grid-template-rows:104px 132px;
  align-content:start;
  padding-top:0;
}

@media(max-width:900px){
  .display-description{
    margin-bottom:24px;
  }

  .metadata-main{
    height:186px;
    grid-template-rows:82px 104px;
  }
}


/* =========================================================
   v1.8 recovery — exact requested metadata placement
   ========================================================= */

.metadata-main{
  position:relative;
  left:0;
  width:100%;
  max-width:none;
  height:236px;
  display:grid;
  grid-template-columns:minmax(0,1fr);
  grid-template-rows:104px 132px;
  justify-content:stretch;
  justify-items:start;
  align-content:start;
  align-items:start;
  padding:0;
  margin:28px 0 0;
  text-align:left;
}

.metadata-main .meta-block{
  width:100%;
  min-width:0;
  margin:0;
  padding:0;
  text-align:left;
  justify-self:start;
}

.metadata-main .label,
.metadata-main .artist,
.metadata-main .song{
  width:100%;
  margin-left:0;
  padding-left:0;
  text-align:left;
  justify-self:start;
}

.display-description{
  margin-bottom:0;
}

@media(max-width:900px){
  .metadata-main{
    left:0;
    width:100%;
    max-width:none;
    height:186px;
    grid-template-rows:82px 104px;
    margin-top:24px;
  }
}


.build-stamp{
  font-size:12px;
  color:#7f93aa;
  font-weight:700;
  vertical-align:middle;
  margin-left:8px;
}

/* Final non-negotiable metadata alignment */
.metadata-main,
.metadata-main .meta-block,
.metadata-main .label,
.metadata-main .artist,
.metadata-main .song{
  margin-left:0 !important;
  padding-left:0 !important;
  text-align:left !important;
  justify-self:start !important;
  transform:none !important;
}

.metadata-main{
  width:100% !important;
  max-width:none !important;
  grid-template-columns:100% !important;
  justify-content:start !important;
  justify-items:start !important;
}

</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <a class="home" href="index.html" aria-label="Home"><span class="home-icon">⌂</span><span>HOME</span></a>
    <div class="brand-block">
      <div class="brand">Live Radio <small class="build-stamp">v2.0</small></div>
    </div>
    <div class="datetime">
      <div id="clock" class="clock">--:--</div>
      <div id="date" class="date"></div>
    </div>
  </header>

  <main class="layout">
    <aside class="station-pane">
      <section>
        <h2>MUSIC</h2>
        <div id="musicList" class="station-list"></div>
      </section>
      <section>
        <h2>DISNEY</h2>
        <div id="disneyList" class="station-list"></div>
      </section>
      <section>
        <h2>PODCASTS</h2>
        <div id="podcastList" class="station-list"></div>
      </section>
    </aside>

    <section class="now-pane">
      <div class="now-header">
        <span>NOW PLAYING</span>
      </div>

      <div id="displayStation" class="display-station">SUPER ’70s</div>
      <div id="displayDescription" class="display-description">The soundtrack of the 70s.</div>

      <div class="metadata-main">
        <div class="meta-block">
          <div class="label">Artist</div>
          <div id="artist" class="artist">—</div>
        </div>
        <div class="meta-block">
          <div class="label">Song</div>
          <div id="song" class="song">—</div>
        </div>
      </div>
    </section>
  </main>

  <footer class="player">
    <div id="miniArt" class="mini-art">’70s</div>
    <div class="mini-copy">
      <div class="mini-label">NOW PLAYING</div>
      <strong id="miniSong">Tap play to begin</strong>
      <span id="miniArtist">Super 70s</span>
    </div>

    <div class="transport">
      <button id="previousButton" aria-label="Previous">◀</button>
      <button id="playButton" class="play" aria-label="Play">▶</button>
      <button id="nextButton" aria-label="Next">▶</button>
    </div>

    <label class="volume">🔊 <input id="volumeSlider" type="range" min="0" max="1" step=".01" value=".75"></label>
  </footer>
</div>

<audio id="radioAudio" preload="none"></audio>
<script>
const stations = [
  {name:"K-LOVE",group:"music",color:"#38b5ff",desc:"Positive. Encouraging.",quality:"AAC",stream:"https://maestro.emfcdn.com/stream_for/k-love/iheart/aac"},
  {name:"Super 70s",display:"SUPER ’70s",group:"music",color:"#ff8b18",desc:"The soundtrack of the 70s.",quality:"128",stream:"https://listen.181fm.com/181-70s_128k.mp3",relayId:"181-70s"},
  {name:"Awesome 80s",display:"AWESOME ’80s",group:"music",color:"#f14db8",desc:"Turn it up.",quality:"128",stream:"https://listen.181fm.com/181-awesome80s_128k.mp3",relayId:"181-awesome80s"},
  {name:"Lite 80s",display:"LITE ’80s",group:"music",color:"#b87cff",desc:"The softer side of the 80s.",quality:"128",stream:"https://listen.181fm.com/181-lite80s_128k.mp3",relayId:"181-lite80s"},
  {name:"Star 90s",display:"STAR ’90s",group:"music",color:"#8dd03a",desc:"The biggest hits of the 90s.",quality:"128",stream:"https://listen.181fm.com/181-star90s_128k.mp3",relayId:"181-star90s"},
  {name:"Lite 90s",display:"LITE ’90s",group:"music",color:"#5ac6ff",desc:"Smooth 90s favorites.",quality:"128",stream:"https://listen.181fm.com/181-lite90s_128k.mp3",relayId:"181-lite90s"},
  {name:"The Yacht",display:"The Yacht",group:"music",color:"#f0ad2d",desc:"Smooth. Soft. Sailing.",quality:"128",stream:"https://listen.181fm.com/181-yachtrock_128k.mp3",relayId:"181-yachtrock"},
  {name:"Good Time Oldies",group:"music",color:"#ffd36f",desc:"More good times.",quality:"128",stream:"https://listen.181fm.com/181-goodtime_128k.mp3",relayId:"181-goodtime"},
  {name:"Soul",display:"Soul",group:"music",color:"#a66cff",desc:"Classic soul. Timeless groove.",quality:"128",stream:"https://listen.181fm.com/181-soul_128k.mp3",relayId:"181-soul"},
  {name:"The Breeze",group:"music",color:"#2ad1df",desc:"Relax. Unwind. Breathe.",quality:"128",stream:"https://listen.181fm.com/181-breeze_128k.mp3",relayId:"181-breeze"},
  {name:"Classical",group:"music",color:"#ddd1ff",desc:"Timeless masterworks.",quality:"128",stream:"https://listen.181fm.com/181-classical_128k.mp3",relayId:"181-classical"},

  {name:"Main Street USA",group:"disney",color:"#d65cff",desc:"Classic park atmosphere.",quality:"",stream:""},
  {name:"Adventureland",group:"disney",color:"#64d46d",desc:"Jungle rhythms and island music.",quality:"",stream:""},
  {name:"Frontierland",group:"disney",color:"#e3a34d",desc:"Western classics and bluegrass.",quality:"",stream:""},
  {name:"Tomorrowland",group:"disney",color:"#5bc4ff",desc:"Retro-futuristic atmosphere.",quality:"",stream:""},
  {name:"Fantasyland",group:"disney",color:"#ff82c8",desc:"Classic melodies and storybook magic.",quality:"",stream:""},
  {name:"Future World",group:"disney",color:"#7e8fff",desc:"Classic EPCOT optimism.",quality:"",stream:""},
  {name:"World Showcase",group:"disney",color:"#52d6c8",desc:"Music from around the world.",quality:"",stream:""},
  {name:"Hollywood Studios",group:"disney",color:"#ff6868",desc:"Movie magic and boulevard atmosphere.",quality:"",stream:""},
  {name:"Animal Kingdom",group:"disney",color:"#8bcf72",desc:"Nature-inspired park ambience.",quality:"",stream:""},
  {name:"Resort TV",group:"disney",color:"#7bc9ef",desc:"Resort loops and vacation atmosphere.",quality:"",stream:""},
  {name:"Pixar",group:"disney",color:"#65a9ff",desc:"Music from Pixar films and lands.",quality:"",stream:""},
  {name:"Villains",group:"disney",color:"#b95de3",desc:"Disney's darker side.",quality:"",stream:""},

  {name:"The Ramsey Show",group:"podcasts",color:"#ffd02c",desc:"Money, work, and life.",quality:"",stream:""},
  {name:"Insight for Living",group:"podcasts",color:"#6bd8ff",desc:"Biblical teaching with Chuck Swindoll.",quality:"",stream:""},
  {name:"Southeast Christian",group:"podcasts",color:"#70d979",desc:"Messages from Southeast Christian Church.",quality:"",stream:""},
  {name:"Brian Buffini",group:"podcasts",color:"#ff9b52",desc:"Business, motivation, and real estate.",quality:"",stream:""}
];

const RELAY = "https://coachdon-metadata.74p875syc7.workers.dev";
const lists = {
  music: document.getElementById("musicList"),
  disney: document.getElementById("disneyList"),
  podcasts: document.getElementById("podcastList")
};
const audio = document.getElementById("radioAudio");
let selected = stations.findIndex(s => s.name === "Super 70s");
let playing = false;
let metadataTimer = null;
let metadataToken = 0;

function labelOf(station){ return station.display || station.name; }

function render(){
  Object.values(lists).forEach(el => el.innerHTML = "");
  stations.forEach((station,index)=>{
    const row = document.createElement("button");
    row.className = "station-row" + (index === selected ? " active" : "");
    row.style.setProperty("--station-color", station.color);
    row.innerHTML = `
      <span class="station-copy">
        <span class="station-name"><span class="playing-mark">▶</span>${labelOf(station)}</span>
        <span class="station-desc">${station.desc}</span>
      </span>`;
    row.addEventListener("click",()=>choose(index,true));
    lists[station.group].appendChild(row);
  });
}

function updateMetadata(artist,song){
  document.getElementById("artist").textContent = artist || "";
  document.getElementById("song").textContent = song || "";
  document.getElementById("miniSong").textContent = song || "Live Radio";
  document.getElementById("miniArtist").textContent = artist || labelOf(stations[selected]);
}

function choose(index,autoplay=false){
  selected = (index + stations.length) % stations.length;
  const station = stations[selected];
  document.documentElement.style.setProperty("--accent", station.color);
  document.getElementById("displayStation").textContent = labelOf(station);
  document.getElementById("displayDescription").textContent = station.desc;
  const stationMeta = document.getElementById("stationMeta");
  if (stationMeta) stationMeta.textContent = labelOf(station);
  document.getElementById("miniArt").textContent =
    labelOf(station).replace(/[^A-Za-z0-9’']/g," ").split(/\s+/).slice(0,2).join(" ");
  render();
  startMetadata(station);
  if(autoplay) playSelected();
}

async function fetchRelay(station,token){
  try{
    const response = await fetch(
      `${RELAY}/metadata?station=${encodeURIComponent(station.relayId)}`,
      {cache:"no-store"}
    );
    const data = await response.json();
    if(!response.ok || !data.ok) throw new Error(data.error || `HTTP ${response.status}`);
    if(token !== metadataToken) return;
    updateMetadata(data.artist || labelOf(station), data.title || "Live Radio");
  }catch(error){
    if(token !== metadataToken) return;
    updateMetadata(labelOf(station),"Live Radio");
    console.warn("CoachDon relay:",error);
  }
}

function startMetadata(station){
  metadataToken++;
  const token = metadataToken;
  if(metadataTimer) clearInterval(metadataTimer);
  metadataTimer = null;

  if(station.relayId){
    updateMetadata("Checking now playing…","One moment…");
    fetchRelay(station,token);
    metadataTimer = setInterval(()=>fetchRelay(station,token),20000);
  }else{
    updateMetadata(
      station.name === "K-LOVE" ? "K-LOVE" : labelOf(station),
      station.stream ? "Live Radio" :
      (station.group === "podcasts" ? "Podcast feed setup needed" : "Stream setup needed")
    );
  }
}

async function playSelected(){
  const station = stations[selected];
  if(!station.stream){
    playing = false;
    document.getElementById("playButton").textContent = "▶";
    return;
  }
  if(audio.src !== station.stream) audio.src = station.stream;
  try{
    await audio.play();
    playing = true;
    document.getElementById("playButton").textContent = "Ⅱ";
    render();
  }catch(error){
    playing = false;
    document.getElementById("playButton").textContent = "▶";
    console.warn("Station could not connect:",error);
  }
}

document.getElementById("playButton").addEventListener("click",()=>{
  if(playing){
    audio.pause();
    playing=false;
    document.getElementById("playButton").textContent="▶";
    render();
  }else{
    playSelected();
  }
});
document.getElementById("previousButton").addEventListener("click",()=>choose(selected-1,true));
document.getElementById("nextButton").addEventListener("click",()=>choose(selected+1,true));
document.getElementById("volumeSlider").addEventListener("input",e=>audio.volume=Number(e.target.value));

function updateClock(){
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleTimeString([], {hour:"numeric",minute:"2-digit"});
  document.getElementById("date").textContent =
    now.toLocaleDateString([], {weekday:"short",month:"short",day:"numeric"});
}

audio.volume=.75;
setInterval(updateClock,30000);
updateClock();
render();
choose(selected,false);

</script>
</body>
</html>
