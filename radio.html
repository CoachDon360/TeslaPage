<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#000000">
<title>CoachDon Radio</title>
<link rel="stylesheet" href="radio-v4.css?v=4.0.1">
</head>
<body>
<div class="radio-shell">
  <header class="radio-topbar">
    <a class="home-button" href="index.html" aria-label="Back to CoachDon CarPlay">⌂ <span>Home</span></a>
    <h1>Radio</h1>
    <div id="radioClock">--:--</div>
  </header>

  <main class="radio-layout">
    <aside class="station-panel">
      <section>
        <div class="section-title music-title"><span>Music ♪</span><i></i></div>
        <div id="musicStations" class="station-list"></div>
      </section>

      <section>
        <div class="section-title disney-title"><span>Disney</span><i></i></div>
        <div id="disneyStations" class="station-list"></div>
      </section>

      <section>
        <div class="section-title podcast-title">
          <span>Podcasts</span><b class="podcast-mark" aria-hidden="true"></b><i></i>
        </div>
        <div id="podcastStations" class="station-list"></div>
      </section>
    </aside>

    <section class="now-playing">
      <div class="art-card">
        <div id="artName" class="art-name">SOUL</div>
        <div id="artSubtitle" class="art-subtitle">Classic soul. Timeless groove.</div>
        <div class="art-rings"></div>
      </div>

      <div class="metadata">
        <div id="modeLabel" class="mode-label">NOW PLAYING</div>
        <h2 id="trackTitle">Choose a station</h2>
        <div class="accent-line"></div>
        <p id="stationTitle">Soul</p>
        <div id="statusText" class="status"><span></span> READY</div>
      </div>
    </section>
  </main>

  <footer class="player">
    <div id="miniArt" class="mini-art">S</div>
    <div class="mini-copy">
      <strong id="miniTitle">Soul</strong>
      <span id="miniSubtitle">Tap play to listen</span>
    </div>
    <div class="transport">
      <button id="previousButton" aria-label="Previous station">◀</button>
      <button id="playButton" class="main-play" aria-label="Play">▶</button>
      <button id="nextButton" aria-label="Next station">▶</button>
    </div>
    <label class="volume">🔊 <input id="volumeSlider" type="range" min="0" max="1" step=".01" value=".75"></label>
    <button id="favoriteButton" class="favorite" aria-label="Favorite">♡</button>
  </footer>
</div>
<audio id="radioAudio" preload="none"></audio>
<script src="radio-v4.js?v=4.0.1"></script>
</body>
</html>
