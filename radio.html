<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#07111d">
<title>CoachDonXM</title>
<link rel="stylesheet" href="styles.css?v=1.1.0">
</head>
<body>
<button id="home" onclick="location.href='index.html'"><span class="homeicon">⌂</span><span class="hometext">HOME</span></button>
<header class="topbar">
  <div><div class="brand">CoachDonXM</div><div class="tagline">ROAD TRIP • SUPER 70s METADATA TEST</div></div>
  <div><div class="clock" id="clock">--:--</div><div class="date" id="date"></div></div>
</header>
<main><div class="list" id="app"></div></main>
<div class="notice" id="notice"></div>
<div class="player">
  <div class="plogo" id="plogo">XM</div>
  <div class="player-info">
    <div class="now">NOW PLAYING</div>
    <div class="pname" id="pname">Choose a channel</div>
    <div class="track" id="track">Ready when you are</div>
    <div class="artist" id="artist"></div>
    <div class="livebar" id="livebar">
      <span class="live-dot"></span><span id="liveState">READY</span>
      <span class="sep">•</span><span id="liveQuality">—</span>
      <span class="sep">•</span><span id="liveAge">Not updated</span>
    </div>
  </div>
  <div class="controls">
    <button class="ctl" id="prev">‹</button>
    <button class="ctl primary" id="play">▶</button>
    <button class="ctl" id="next">›</button>
  </div>
</div>
<audio id="audio" preload="none"></audio>
<script src="stations.js?v=1.1.0"></script>
<script src="metadata.js?v=1.1.0"></script>
<script src="app.js?v=1.1.0"></script>
</body>
</html>
