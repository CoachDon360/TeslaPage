<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#07111d">
<title>CoachDonXM v11</title>
<link rel="stylesheet" href="coachdon-v11.css?v=11.1.0">
</head>
<body>
<button id="home" onclick="location.href='index.html'"><span class="homeicon">⌂</span><span class="hometext">HOME</span></button>
<header class="topbar">
  <div><div class="brand">Streaming Radio</div><div class="tagline">COACHDONXM • RELAY EDITION</div></div>
  <div><div class="clock" id="clock">--:--</div><div class="date" id="date"></div></div>
</header>
<main><div class="list" id="stationList"></div></main>
<div class="notice" id="notice"></div>
<footer class="player">
  <div class="plogo" id="plogo">’70s</div>
  <div>
    <div class="now">NOW PLAYING</div>
    <div class="pname" id="pname">Super 70s</div>
    <div class="artist" id="artist">SUPER 70s</div>
    <div class="track" id="track">Tap play to begin</div>
    <div class="livebar"><span id="metadataStatus">READY</span><span id="provider">181.FM</span><span id="quality">128 kbps</span></div>
  </div>
  <div class="controls">
    <button class="ctl" id="prev" aria-label="Previous">‹</button>
    <button class="ctl primary" id="play" aria-label="Play">▶</button>
    <button class="ctl" id="next" aria-label="Next">›</button>
  </div>
  <button class="favorite" id="favorite" aria-label="Favorite">♡</button>
</footer>
<audio id="audio" preload="none"></audio>
<script src="stations-v11.js?v=11.1.0"></script>
<script src="metadata-relay-v11.js?v=11.1.0"></script>
<script src="app-v11.js?v=11.1.0"></script>
</body>
</html>
