<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0b0e12">
<title>CoachDonXM Final 2</title>
<style>
:root{--blue:#178ee8;--ink:#f7f9fc;--muted:#aeb7c2;--bg:#0b0e12;--line:#343b44}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;min-height:100vh;padding-bottom:132px;background:radial-gradient(circle at 50% -15%,#2b3540 0,#11161c 40%,var(--bg) 75%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
header{position:sticky;top:0;z-index:5;background:rgba(12,15,19,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 22px 14px 92px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:24px;margin:0;letter-spacing:.3px} .clock{font-size:18px;color:var(--muted);font-variant-numeric:tabular-nums}
#osHome{position:fixed;top:10px;left:10px;z-index:999;border:0;border-radius:13px;padding:9px 15px;background:#178ee8;color:#fff;font:750 15px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial;box-shadow:0 7px 20px #0007}
main{max-width:1180px;margin:auto;padding:18px 18px 35px}
.section{font-size:14px;font-weight:800;letter-spacing:1.4px;color:#7fbff2;margin:22px 8px 9px;text-transform:uppercase}
.list{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:rgba(31,36,43,.86);box-shadow:0 14px 40px rgba(0,0,0,.26)}
.channel{min-height:88px;width:100%;display:grid;grid-template-columns:72px 210px minmax(0,1fr) 38px;gap:14px;align-items:center;border:0;border-bottom:1px solid var(--line);background:transparent;color:inherit;text-align:left;padding:0 18px;cursor:pointer}
.channel:last-child{border-bottom:0} .channel:active,.channel.active{background:linear-gradient(90deg,#0869ad,#178ee8)}
.num{font-size:38px;font-weight:790;letter-spacing:-1.5px;color:#8fc9f6}
.channel.active .num{color:#fff}
.badge{height:38px;width:210px;border-radius:11px;display:flex;align-items:center;justify-content:center;padding:0 10px;color:#fff;font-size:15px;font-weight:900;line-height:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:1px solid rgba(255,255,255,.24);box-shadow:inset 0 1px 0 rgba(255,255,255,.22),0 5px 12px rgba(0,0,0,.28);letter-spacing:.2px}
.name{font-size:23px;font-weight:730;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.desc{font-size:15px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.channel.active .desc{color:#eaf6ff} .signal{text-align:right;font-size:18px;color:#75808b} .channel.active .signal{color:#fff}
/* Fun, straight-edged station personalities — no slanted stickers */
.klove{background:linear-gradient(135deg,#1688e8,#07549e);font-family:"Trebuchet MS",Arial,sans-serif}
.wayfm{background:linear-gradient(135deg,#35b96f,#087747);font-family:"Arial Rounded MT Bold","Trebuchet MS",sans-serif}
.mellow{background:linear-gradient(135deg,#d7a83e,#8b5616);font-family:Georgia,"Times New Roman",serif}
.oldies{background:linear-gradient(135deg,#ff775c,#b62452);font-family:"Trebuchet MS",Arial,sans-serif}
.mix{background:linear-gradient(135deg,#bd4ef0,#5d38bf);font-family:"Arial Rounded MT Bold",Arial,sans-serif}
.yacht{background:linear-gradient(135deg,#153f71,#c89d37);font-family:Georgia,"Times New Roman",serif}
.seventies{background:linear-gradient(135deg,#e97023,#7b3b91);font-family:"Trebuchet MS",Arial,sans-serif}
.eighties{background:linear-gradient(135deg,#ff38c7,#147ee8);font-family:"Arial Black","Trebuchet MS",sans-serif}
.nineties{background:linear-gradient(135deg,#21c8b7,#5d49db);font-family:"Trebuchet MS",Arial,sans-serif}
.paradise{background:linear-gradient(135deg,#dc5c47,#773886);font-family:Georgia,"Times New Roman",serif}
.drone{background:linear-gradient(135deg,#263a76,#171b35);font-family:"Courier New",monospace}
.cinema{background:linear-gradient(135deg,#9f252d,#311317);font-family:Georgia,serif}
.breeze{background:linear-gradient(135deg,#42b9c5,#166682);font-family:"Trebuchet MS",Arial,sans-serif}
.classical{background:linear-gradient(135deg,#765c9e,#30244d);font-family:Georgia,serif}
.piano{background:linear-gradient(135deg,#888,#30343a);font-family:Georgia,serif}
.drybar{background:linear-gradient(135deg,#ef8e2f,#ad3d16);font-family:"Arial Rounded MT Bold",Arial,sans-serif}
.comedy{background:linear-gradient(135deg,#8e4bd1,#d14686);font-family:"Arial Black",Arial,sans-serif}
.moody{background:linear-gradient(135deg,#165aa4,#12304f);font-family:Georgia,serif}
.wetr{background:linear-gradient(135deg,#cb5636,#78301e);font-family:"Trebuchet MS",Arial,sans-serif}
.disney,.magic,.classics{background:linear-gradient(135deg,#e32735,#8c1021);font-family:"Arial Rounded MT Bold",Arial,sans-serif}
.resort,.relax,.tv{background:linear-gradient(135deg,#3d9fc0,#1f557a);font-family:Georgia,serif}
.epcot,.tomorrow{background:linear-gradient(135deg,#6d4cc8,#247db4);font-family:"Trebuchet MS",Arial,sans-serif}
.studios,.night{background:linear-gradient(135deg,#713f91,#1f234d);font-family:"Arial Black",Arial,sans-serif}
.animal,.adventure{background:linear-gradient(135deg,#4b8f48,#7a5129);font-family:"Trebuchet MS",Arial,sans-serif}
.christmas{background:linear-gradient(135deg,#b81e36,#17683b);font-family:Georgia,serif}
.mainstreet{background:linear-gradient(135deg,#c85454,#32679d);font-family:Georgia,serif}
.frontier{background:linear-gradient(135deg,#a26732,#53351e);font-family:"Courier New",monospace}
.player{position:fixed;bottom:0;left:0;right:0;z-index:10;background:rgba(20,25,31,.98);backdrop-filter:blur(16px);border-top:1px solid #45505b;display:grid;grid-template-columns:92px 1fr auto;align-items:center;gap:13px;padding:12px 18px calc(12px + env(safe-area-inset-bottom));min-height:112px}
.pnum{height:72px;border-radius:13px;background:#178ee8;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800}
.pname{font-size:23px;font-weight:760;white-space:nowrap;overflow:hidden;text-overflow:ellipsis} .track{font-size:18px;font-weight:700;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:54vw}
.artist{font-size:15px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:54vw} .pstatus{font-size:13px;color:#7fbff2;margin-top:3px}
.controls{display:flex;gap:9px} .ctl{height:62px;min-width:76px;border-radius:14px;border:1px solid #53606d;background:#2a3139;color:white;font-size:25px;font-weight:700;padding:0 18px} .ctl.primary{background:#178ee8;border-color:#62b9fa} .ctl:active{transform:scale(.97)}
.notice{display:none;position:fixed;left:50%;bottom:128px;transform:translateX(-50%);z-index:20;background:#eef7ff;color:#13202c;border-radius:12px;padding:11px 16px;font-weight:700;box-shadow:0 8px 30px #0008;max-width:92%;text-align:center} .notice.show{display:block}
@media(max-width:760px){.channel{grid-template-columns:58px 145px minmax(0,1fr) 26px;gap:8px;min-height:82px;padding:0 10px}.num{font-size:31px}.badge{width:145px;height:35px;font-size:12px;padding:0 6px}.name{font-size:19px}.desc{font-size:13px}.player{grid-template-columns:65px 1fr;min-height:124px}.pnum{height:62px;font-size:30px}.controls{grid-column:1/-1}.ctl{flex:1;height:48px}}
</style>
</head>
<body>
<button id="osHome" type="button" onclick="location.href='index.html'">Home</button>
<header><h1>CHANNELS <span style='font-size:12px;color:#7fbff2;vertical-align:middle'>FINAL 2</span></h1><div class="clock" id="clock"></div></header>
<main id="app"></main><div class="notice" id="notice"></div>
<div class="player"><div class="pnum" id="pnum">—</div><div><div class="pname" id="pname">Choose a channel</div><div class="track" id="track">Ready when you are</div><div class="artist" id="artist"></div><div class="pstatus" id="pstatus">Tap any row to begin</div></div><div class="controls"><button class="ctl" id="prev">‹</button><button class="ctl primary" id="play">▶</button><button class="ctl" id="next">›</button></div></div>
<audio id="audio" preload="none"></audio>
<script>
const channels=[{"n": 1, "name": "K-LOVE", "desc": "Positive & encouraging", "streams": ["https://maestro.emfcdn.com/stream_for/k-love/web/aac", "https://listen.klove.com/stream"], "style": "klove"}, {"n": 2, "name": "WayFM", "desc": "Meaningful music & conversation", "lookup": ["WayFM", "WAY-FM"], "streams": [], "style": "wayfm"}, {"n": 3, "name": "181.FM Mellow Gold", "desc": "Dependable soft gold favorites", "streams": ["https://listen.181fm.com/181-mellow_128k.mp3"], "style": "mellow"}, {"n": 4, "name": "181.FM Good Time Oldies", "desc": "Continuous oldies from 181.FM", "streams": ["https://listen.181fm.com/181-goodtime_128k.mp3"], "style": "oldies"}, {"n": 5, "name": "181.FM The Mix", "desc": "Familiar pop favorites", "streams": ["https://listen.181fm.com/181-mix_128k.mp3"], "style": "mix"}, {"n": 6, "name": "181.FM Yacht Rock", "desc": "Smooth sailing", "streams": ["https://listen.181fm.com/181-yachtrock_128k.mp3"], "style": "yacht"}, {"n": 7, "name": "181.FM Super 70s", "desc": "The sound of the seventies", "streams": ["https://listen.181fm.com/181-70s_128k.mp3"], "style": "seventies"}, {"n": 8, "name": "181.FM Awesome 80s", "desc": "Big eighties favorites", "streams": ["https://listen.181fm.com/181-awesome80s_128k.mp3"], "style": "eighties"}, {"n": 9, "name": "181.FM Star 90s", "desc": "Nineties hits", "streams": ["https://listen.181fm.com/181-star90s_128k.mp3"], "style": "nineties"}, {"n": 10, "name": "Radio Paradise Mellow Mix", "desc": "Curated, continuous mellow music", "streams": ["https://stream.radioparadise.com/mellow-192", "https://stream.radioparadise.com/mellow-128"], "style": "paradise"}, {"n": 11, "name": "SomaFM Drone Zone", "desc": "Deep ambient space music", "streams": ["https://ice3.somafm.com/dronezone-256-mp3", "https://ice5.somafm.com/dronezone-256-mp3"], "meta": {"type": "somafm", "id": "dronezone"}, "style": "drone"}, {"n": 12, "name": "Cinema", "desc": "Film and television scores", "streams": ["https://kathy.torontocast.com:1825/stream"], "style": "cinema"}, {"n": 13, "name": "181.FM The Breeze", "desc": "Smooth jazz for the road", "streams": ["https://listen.181fm.com/181-breeze_128k.mp3"], "style": "breeze"}, {"n": 14, "name": "181.FM Classical", "desc": "Essential orchestral works", "streams": ["https://listen.181fm.com/181-classical_128k.mp3"], "style": "classical"}, {"n": 15, "name": "Solo Piano", "desc": "Peaceful solo piano", "streams": ["https://pianosolo.streamguys1.com/live", "https://pianosolo.streamguys1.com/live-aac"], "style": "piano"}, {"n": 16, "name": "Dry Bar Comedy", "desc": "Newest clean-comedy episode", "podcast": "Dry Bar Comedy", "streams": [], "style": "drybar"}, {"n": 17, "name": "181.FM Comedy", "desc": "Continuous comedy without a subscription", "streams": ["https://listen.181fm.com/181-comedy_128k.mp3"], "style": "comedy"}, {"n": 18, "name": "Moody Radio", "desc": "Christian teaching and conversation", "lookup": ["Moody Radio", "Moody Radio Network"], "streams": [], "style": "moody"}, {"n": 19, "name": "WETR Talk Radio", "desc": "Talk radio and The Ramsey Show", "streams": ["https://streaming.live365.com/a44035"], "style": "wetr"}, {"n": 20, "name": "Disney Parks", "desc": "DParkRadio park rotation", "streams": ["https://cheetah.streemlion.com/dparkradio"], "style": "disney"}, {"n": 21, "name": "Disney Resorts", "desc": "Sorcerer Radio resort atmosphere", "streams": ["https://26343.live.streamtheworld.com/SAM05AAC015.mp3"], "style": "resort"}, {"n": 22, "name": "Magic Kingdom", "desc": "Disney park music rotation", "streams": ["https://cheetah.streemlion.com/dparkradio"], "style": "magic"}, {"n": 23, "name": "EPCOT", "desc": "Disney area music rotation", "streams": ["https://26343.live.streamtheworld.com/SAM05AAC015.mp3"], "style": "epcot"}, {"n": 24, "name": "Hollywood Studios", "desc": "Disney park music rotation", "streams": ["https://cheetah.streemlion.com/dparkradio"], "style": "studios"}, {"n": 25, "name": "Animal Kingdom", "desc": "Disney atmosphere rotation", "streams": ["https://26343.live.streamtheworld.com/SAM05AAC015.mp3"], "style": "animal"}, {"n": 26, "name": "Disney Classics", "desc": "Songs from Disney films", "streams": ["https://allzic52.ice.infomaniak.ch/allzic52.mp3"], "style": "classics"}, {"n": 27, "name": "Disney Christmas", "desc": "Seasonal Disney rotation", "streams": ["https://26343.live.streamtheworld.com/SAM05AAC015.mp3"], "style": "christmas"}, {"n": 28, "name": "Nighttime Spectaculars", "desc": "Shows and park-audio rotation", "streams": ["https://cheetah.streemlion.com/dparkradio"], "style": "night"}, {"n": 29, "name": "Relaxing Disney", "desc": "Peaceful Disney atmosphere", "streams": ["https://26343.live.streamtheworld.com/SAM05AAC015.mp3"], "style": "relax"}, {"n": 30, "name": "Main Street U.S.A.", "desc": "Classic park atmosphere", "streams": ["https://cheetah.streemlion.com/dparkradio"], "style": "mainstreet"}, {"n": 31, "name": "Frontierland", "desc": "Western Disney atmosphere", "streams": ["https://cheetah.streemlion.com/dparkradio"], "style": "frontier"}, {"n": 32, "name": "Adventureland", "desc": "Jungle and adventure rotation", "streams": ["https://cheetah.streemlion.com/dparkradio"], "style": "adventure"}, {"n": 33, "name": "Tomorrowland", "desc": "Retro-future Disney rotation", "streams": ["https://26343.live.streamtheworld.com/SAM05AAC015.mp3"], "style": "tomorrow"}, {"n": 34, "name": "Disney Resort TV", "desc": "Resort music and atmosphere", "streams": ["https://26343.live.streamtheworld.com/SAM05AAC015.mp3"], "style": "tv"}];
const sections=[['Music',1,10],['Relax',11,15],['Comedy',16,17],['Talk',18,19],['Disney',20,34]];
const $=id=>document.getElementById(id);
const app=$('app'),audio=$('audio'),notice=$('notice'),pnum=$('pnum'),pname=$('pname'),track=$('track'),artist=$('artist'),pstatus=$('pstatus'),play=$('play');
let current=-1,playing=false,token=0,metaTimer=null;
for(const [title,a,b] of sections){const h=document.createElement('div');h.className='section';h.textContent=title;app.append(h);const list=document.createElement('div');list.className='list';channels.filter(c=>c.n>=a&&c.n<=b).forEach(c=>{const btn=document.createElement('button');btn.className='channel';btn.dataset.n=c.n;btn.innerHTML=`<div class="num">${String(c.n).padStart(2,'0')}</div><div class="badge ${c.style||''}">${c.name}</div><div><div class="name">${c.name}</div><div class="desc">${c.desc}</div></div><div class="signal">●</div>`;btn.onclick=()=>select(channels.indexOf(c),true);list.append(btn)});app.append(list)}
function toast(t){notice.textContent=t;notice.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>notice.classList.remove('show'),2800)}
function setMetadata(t='',a=''){track.textContent=t||'Live Radio';artist.textContent=a||''}
function paint(status){document.querySelectorAll('.channel').forEach(x=>x.classList.toggle('active',+x.dataset.n===channels[current]?.n));if(current<0)return;const c=channels[current];pnum.textContent=String(c.n).padStart(2,'0');pname.textContent=c.name;pstatus.textContent=status||(playing?'LIVE':'READY');play.textContent=playing?'❚❚':'▶';document.querySelector(`[data-n="${c.n}"]`)?.scrollIntoView({block:'nearest',behavior:'smooth'})}
function stopMetadata(){if(metaTimer){clearInterval(metaTimer);metaTimer=null}}
function stop(){stopMetadata();audio.pause();audio.removeAttribute('src');audio.load();playing=false}
async function refreshMetadata(c,myToken){if(!c.meta||myToken!==token)return;try{const r=await fetch(`https://somafm.com/songs/${c.meta.id}.json`,{cache:'no-store'});const j=await r.json();const song=Array.isArray(j.songs)?j.songs[0]:null;if(song&&myToken===token)setMetadata(song.title||'Live Radio',song.artist||'')}catch(e){}}
function startMetadata(c,myToken){stopMetadata();setMetadata('Live Radio','');if(!c.meta)return;refreshMetadata(c,myToken);metaTimer=setInterval(()=>refreshMetadata(c,myToken),15000)}
async function resolvePodcast(term,myToken){paint('Loading newest episode…');const r=await fetch(`https://itunes.apple.com/search?media=podcast&entity=podcast&limit=8&term=${encodeURIComponent(term)}`);const j=await r.json();const hit=j.results.find(x=>x.feedUrl);if(!hit)throw Error();let xml='';for(const proxy of [u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,u=>`https://corsproxy.io/?${encodeURIComponent(u)}`]){try{const rr=await fetch(proxy(hit.feedUrl));if(rr.ok){xml=await rr.text();if(xml.includes('<item'))break}}catch(e){}}if(!xml||myToken!==token)throw Error();const doc=new DOMParser().parseFromString(xml,'text/xml'),item=doc.querySelector('item'),url=item?.querySelector('enclosure')?.getAttribute('url'),title=item?.querySelector('title')?.textContent?.trim();if(!url)throw Error();return{url,title:title||'Newest episode'}}
async function resolveDirectory(c,myToken){if(!c.lookup)return[];for(const term of c.lookup)for(const host of ['https://de1.api.radio-browser.info','https://nl1.api.radio-browser.info','https://at1.api.radio-browser.info']){if(myToken!==token)return[];try{paint('Finding current stream…');const r=await fetch(`${host}/json/stations/byname/${encodeURIComponent(term)}?hidebroken=true&order=clickcount&reverse=true&limit=12`,{cache:'no-store'});const rows=await r.json();const urls=rows.filter(x=>x.url_resolved&&/^https:\/\//i.test(x.url_resolved)).sort((a,b)=>(b.bitrate||0)-(a.bitrate||0)).map(x=>x.url_resolved);if(urls.length)return[...new Set(urls)]}catch(e){}}return[]}
async function tryStream(c,myToken){if(c.podcast){const ep=await resolvePodcast(c.podcast,myToken);audio.src=ep.url;setMetadata(ep.title,'Dry Bar Comedy');await audio.play();playing=true;paint('PLAYING');return}const urls=[...(await resolveDirectory(c,myToken)),...(c.streams||[])];for(let i=0;i<urls.length;i++){if(myToken!==token)return;audio.src=urls[i];audio.load();paint(i?'Trying backup…':'Connecting…');try{await audio.play();playing=true;startMetadata(c,myToken);paint('LIVE');return}catch(e){}}throw Error()}
async function startCurrent(){if(current<0)return;const c=channels[current],myToken=++token;stop();setMetadata('Connecting…','');paint('CONNECTING');try{await tryStream(c,myToken)}catch(e){playing=false;setMetadata('Temporarily unavailable','Tap Play to retry');paint('OFF AIR');toast('The station did not answer. Tap Play to retry.')}}
async function select(i,autoplay=false){current=(i+channels.length)%channels.length;++token;stop();setMetadata(channels[current].desc,'');paint('READY');if(autoplay)await startCurrent()}
play.onclick=async()=>{if(current<0)return select(0,true);if(playing){audio.pause();playing=false;paint('PAUSED')}else await startCurrent()};
$('prev').onclick=()=>select(current<0?channels.length-1:current-1,true);$('next').onclick=()=>select(current<0?0:current+1,true);
audio.addEventListener('error',()=>{playing=false;play.textContent='▶'});
function tick(){$('clock').textContent=new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}tick();setInterval(tick,1000);
</script>
</body>
