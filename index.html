<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#05070a"><title>CoachDon CarPlay</title>
<style>
*{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:#fff;background:#05070a}
body{background:radial-gradient(circle at 82% 0,#293a51 0,#101720 36%,#05070a 76%)}
.shell{height:100%;display:flex;flex-direction:column;padding:14px 18px 9px}.top{min-height:86px;display:flex;justify-content:space-between;align-items:center;padding:3px 8px 12px}
.title{font-size:29px;font-weight:800}.sub{font-size:18px;margin-top:7px}.time{text-align:right;font-size:30px;font-weight:800}.date{font-size:15px;color:#a9b4c1;margin-top:3px}
.grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(3,1fr);gap:13px;padding:2px 4px 7px}
.app{color:#fff;text-decoration:none;display:flex;flex-direction:column;align-items:center;justify-content:center}.icon{width:min(11.2vw,105px);height:min(11.2vw,105px);min-width:76px;min-height:76px;border-radius:24%;overflow:hidden;display:grid;place-items:center;background:#147fd0;box-shadow:0 13px 27px #0007}.icon img{width:100%;height:100%;object-fit:cover}.radio{font-size:48px}.label{font-size:16px;font-weight:700;margin-top:7px}
.empty{visibility:hidden}@media(max-width:850px){.shell{padding:9px}.top{min-height:72px}.title{font-size:22px}.time{font-size:24px}.grid{gap:8px}.label{font-size:13px}.icon{min-width:62px;min-height:62px}}
</style></head><body>
<div class="shell"><header class="top"><div><div class="title">CoachDon CarPlay</div><div class="sub">Home · ☀️ Weather</div></div><div><div id="time" class="time">--:--</div><div id="date" class="date"></div></div></header>
<main class="grid">
<a class="app" href="radio.html"><div class="icon radio">♫</div><div class="label">Radio</div></a>
<a class="app" href="https://www.bible.com/"><div class="icon"><img src="bible.png"></div><div class="label">Bible</div></a>
<a class="app" href="https://www.ramseysolutions.com/"><div class="icon"><img src="ramsey.png"></div><div class="label">Ramsey</div></a>
<a class="app" href="https://www.iheart.com/"><div class="icon"><img src="iheart.png"></div><div class="label">iHeartRadio</div></a>
<a class="app" href="https://maps.google.com/"><div class="icon"><img src="maps.png"></div><div class="label">Google Maps</div></a>
<a class="app" href="https://earth.google.com/web/"><div class="icon"><img src="earth.png"></div><div class="label">Google Earth</div></a>
<a class="app" href="https://www.rightnowmedia.org/"><div class="icon"><img src="rightnow-media.png"></div><div class="label">RightNow Media</div></a>
<a class="app" href="https://www.tesla.com/"><div class="icon"><img src="tesla.png"></div><div class="label">Tesla</div></a>
<div class="empty"></div><div class="empty"></div><div class="empty"></div><div class="empty"></div>
</main></div>
<script>function tick(){const n=new Date();time.textContent=n.toLocaleTimeString([],{hour:"numeric",minute:"2-digit"});date.textContent=n.toLocaleDateString([],{weekday:"long",month:"long",day:"numeric"})}tick();setInterval(tick,30000)</script>
</body></html>
