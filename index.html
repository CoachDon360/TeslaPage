<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#03142e">
  <title>AtMOUSEpheres</title>
  <link rel="stylesheet" href="styles.css?v=1.0.0">
</head>
<body>
  <main class="app-shell">
    <section class="launcher-panel" aria-label="Disney radio channels">
      <header class="brand-lockup">
        <h1><span>At</span><strong>m<span class="mouse-o">o</span>use</strong><span>pheres</span></h1>
        <p><i>✦</i> A little getaway for your ears <i>✦</i></p>
      </header>

      <div class="station-grid" id="stationGrid"></div>

      <footer class="left-footer">
        <a class="home-button" href="index.html" aria-label="Home">
          <span aria-hidden="true">⌂</span>
          <small>HOME</small>
        </a>
        <div class="footer-message">
          <strong>Tap any channel</strong>
          <span>to start listening</span>
        </div>
        <time id="clock">--:--</time>
      </footer>
    </section>

    <section class="player-panel" aria-label="Now playing">
      <div class="scene scene-atmospheres" id="scene">
        <div class="stars"></div>
        <div class="castle" aria-hidden="true">
          <span class="tower t1"></span>
          <span class="tower t2"></span>
          <span class="tower t3"></span>
          <span class="tower t4"></span>
          <span class="tower t5"></span>
          <span class="keep"></span>
          <span class="arch"></span>
        </div>
        <div class="reflection"></div>
      </div>

      <header class="player-header">
        <span class="live-pill"><b></b> LIVE</span>
        <img id="networkLogo" src="sorcerer-radio-icon.png" alt="Sorcerer Radio">
      </header>

      <div class="station-heading">
        <h2 id="stationTitle">Atmospheres</h2>
        <p id="stationDescription">Relaxing Disney park music</p>
      </div>

      <section class="now-playing-card">
        <div>
          <span class="eyebrow">NOW PLAYING</span>
          <strong id="trackTitle">Live radio stream</strong>
          <small id="trackSubtitle">Tap Play to begin</small>
        </div>
        <div class="album-art" aria-hidden="true">✦</div>
      </section>

      <div class="transport">
        <button id="previousButton" type="button" aria-label="Previous station">|◀</button>
        <button id="playButton" class="play-button" type="button" aria-label="Play">▶</button>
        <button id="nextButton" type="button" aria-label="Next station">▶|</button>
      </div>

      <nav class="player-tabs" aria-label="Player options">
        <button class="active" type="button"><span>♫</span>Now Playing</button>
        <button type="button"><span>ⓘ</span>Info</button>
        <button type="button"><span>▦</span>Schedule</button>
        <button type="button"><span>☆</span>Favorite</button>
      </nav>

      <div id="statusMessage" class="status-message" aria-live="polite"></div>
      <audio id="audioPlayer" preload="none"></audio>
    </section>
  </main>

  <script src="app.js?v=1.0.0"></script>
</body>
</html>
