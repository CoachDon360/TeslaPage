<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#05070a">
<title>CoachDon CarPlay v8.1</title>
<style>
:root{--bg:#05070a;--text:#f7f9fc;--muted:#a9b4c1;--blue:#138fea}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;color:var(--text);background:var(--bg)}
body{background:radial-gradient(circle at 82% 0,#293a51 0,#101720 36%,#05070a 76%)}
.shell{height:100%;display:flex;flex-direction:column;padding:14px 18px 9px}
.top{min-height:86px;display:flex;justify-content:space-between;align-items:center;padding:3px 8px 12px;gap:28px}
.header-left{min-width:0}
.greeting{font-size:29px;font-weight:770;letter-spacing:-.6px;white-space:nowrap}
.page-row{display:flex;align-items:center;gap:16px;margin-top:7px;min-height:28px}
.page-name{font-size:18px;font-weight:760;color:#fff;white-space:nowrap}
.weather-glance{display:inline-flex;align-items:center;gap:7px;color:#d9eafa;font-size:17px;font-weight:700;text-decoration:none;white-space:nowrap}
.weather-glance .wxicon{font-size:21px}
#wxtext{color:var(--muted);font-weight:650}
.datetime{margin-left:auto;text-align:right;align-self:center;white-space:nowrap}
.time{font-size:30px;font-weight:780;font-variant-numeric:tabular-nums}
.date{font-size:15px;color:var(--muted);margin-top:3px}
.carousel{flex:1;display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;gap:14px;overscroll-behavior-x:contain}
.carousel::-webkit-scrollbar{display:none}
.page{flex:0 0 100%;scroll-snap-align:start;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));grid-template-rows:repeat(3,minmax(0,1fr));gap:13px;padding:2px 4px 7px;align-content:center}
.app{min-width:0;text-decoration:none;color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;border:0;background:none;font:inherit;cursor:pointer}
.icon{width:min(11.2vw,105px);height:min(11.2vw,105px);min-width:76px;min-height:76px;border-radius:24%;display:grid;place-items:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.24),0 13px 27px rgba(0,0,0,.34);border:1px solid rgba(255,255,255,.13);overflow:hidden;position:relative}
.icon:after{content:"";position:absolute;inset:0;background:linear-gradient(155deg,rgba(255,255,255,.2),transparent 43%);pointer-events:none}
.icon svg{width:68%;height:68%;display:block;position:relative;z-index:1}
.app:active .icon{transform:scale(.955)}
.label{font-size:16px;font-weight:680;margin-top:7px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.blue{background:linear-gradient(145deg,#1ba1ff,#075fa4)}.red{background:linear-gradient(145deg,#f15a50,#a3262f)}.green{background:linear-gradient(145deg,#4fc777,#1e7b45)}.gold{background:linear-gradient(145deg,#e9bb51,#9c6515)}
.cfa{background:#e51636}.culvers{background:#005696}.wawa{background:#f7d425}.jersey{background:#d71920}.tropical{background:linear-gradient(145deg,#7ac943,#008f64)}.mcd{background:#da291c}.starbucks{background:#00754a}
.flex{background:linear-gradient(145deg,#35a7ce,#166d9d)}.showing{background:linear-gradient(145deg,#2e82c6,#164d84)}.dotloop{background:#fff}.forewarn{background:linear-gradient(145deg,#f39a31,#c45b18)}.zillow{background:#006aff}.exit{background:#fff}
.empty-note{grid-column:1/-1;align-self:center;justify-self:center;text-align:center;color:var(--muted);font-size:22px;line-height:1.45;max-width:620px}
.dots{height:25px;display:flex;justify-content:center;align-items:center;gap:9px}.dot{width:9px;height:9px;border:0;border-radius:99px;background:#596472;padding:0}.dot.active{width:27px;background:#31a7ff}.swipe{text-align:center;color:#7e8b99;font-size:12px;margin-top:-2px}
@media(max-width:850px){.shell{padding:9px 11px 6px}.top{min-height:72px;padding-bottom:8px}.greeting{font-size:22px}.page-row{gap:10px;margin-top:4px}.page-name{font-size:15px}.weather-glance{font-size:14px}.time{font-size:24px}.date{font-size:12px}.page{gap:8px}.label{font-size:13px}.icon{min-width:62px;min-height:62px}}
</style>
</head>
<body>
<div class="shell">
<header class="top">
<div class="header-left">
<div class="greeting" id="greeting">Good morning, Coach Don</div>
<div class="page-row">
<div class="page-name" id="pageName">Home</div>
<a class="weather-glance" href="https://forecast.weather.gov/MapClick.php?lat=38.20947&lon=-84.86695&FcstType=graphical">
<span class="wxicon" id="wxicon">🌤️</span><span id="wxtemp">--°</span><span id="wxtext">Forecast</span>
</a>
</div>
</div>
<div class="datetime"><div class="time" id="time">--:--</div><div class="date" id="date"></div></div>
</header>

<main class="carousel" id="carousel">
<section class="page" data-name="Home">
<a class="app" href="radio.html?v=8.1"><div class="icon blue"><svg viewBox="0 0 100 100"><rect x="17" y="27" width="66" height="52" rx="13" fill="none" stroke="white" stroke-width="7"/><line x1="28" y1="17" x2="72" y2="17" stroke="white" stroke-width="7" stroke-linecap="round"/><circle cx="37" cy="53" r="10" fill="white"/><circle cx="68" cy="48" r="5" fill="white"/><circle cx="68" cy="65" r="5" fill="white"/></svg></div><div class="label">Radio</div></a>
<button class="app" data-page="1"><div class="icon red"><svg viewBox="0 0 100 100"><path d="M24 45h52l-5 28H29z" fill="white"/><path d="M30 41c2-14 11-22 20-22s18 8 20 22" fill="none" stroke="white" stroke-width="7" stroke-linecap="round"/><path d="M22 48h56" stroke="#a3262f" stroke-width="5"/></svg></div><div class="label">Food</div></button>
<button class="app" data-page="2"><div class="icon green"><svg viewBox="0 0 100 100"><path d="M17 50L50 22l33 28" fill="none" stroke="white" stroke-width="8" stroke-linejoin="round"/><path d="M27 46v31h46V46" fill="none" stroke="white" stroke-width="8" stroke-linejoin="round"/><rect x="44" y="57" width="13" height="20" rx="2" fill="white"/></svg></div><div class="label">Real Estate</div></button>
<button class="app" data-page="3"><div class="icon gold"><svg viewBox="0 0 100 100"><path d="M50 16l10 22 24 3-18 17 5 24-21-12-21 12 5-24-18-17 24-3z" fill="white"/></svg></div><div class="label">Favorites</div></button>
</section>

<section class="page" data-name="Food">
<a class="app" href="https://www.chick-fil-a.com/" target="_blank"><div class="icon cfa"><svg viewBox="0 0 100 100"><text x="50" y="67" text-anchor="middle" font-family="Georgia" font-size="58" font-style="italic" font-weight="700" fill="white">C</text></svg></div><div class="label">Chick-fil-A</div></a>
<a class="app" href="https://www.culvers.com/order-ahead" target="_blank"><div class="icon culvers"><svg viewBox="0 0 100 100"><text x="50" y="59" text-anchor="middle" font-family="Georgia" font-size="24" font-style="italic" font-weight="700" fill="white">Culver’s</text></svg></div><div class="label">Culver’s</div></a>
<a class="app" href="https://www.wawa.com/online-ordering" target="_blank"><div class="icon wawa"><svg viewBox="0 0 100 100"><path d="M20 44c17-11 31-9 43 1 8-2 14-2 19 0-13 1-21 5-27 12-10-7-21-11-35-13z" fill="#c62033"/><text x="50" y="72" text-anchor="middle" font-family="Arial" font-size="22" font-weight="900" fill="#c62033">Wawa</text></svg></div><div class="label">Wawa</div></a>
<a class="app" href="https://www.jerseymikes.com/" target="_blank"><div class="icon jersey"><svg viewBox="0 0 100 100"><text x="50" y="46" text-anchor="middle" font-family="Arial" font-size="19" font-weight="900" fill="white">JERSEY</text><text x="50" y="68" text-anchor="middle" font-family="Arial" font-size="19" font-weight="900" fill="white">MIKE’S</text></svg></div><div class="label">Jersey Mike’s</div></a>
<a class="app" href="https://www.tropicalsmoothiecafe.com/" target="_blank"><div class="icon tropical"><svg viewBox="0 0 100 100"><path d="M50 76V37" stroke="white" stroke-width="6"/><path d="M50 39c-15-10-25-8-31-2 14 0 23 4 31 12m0-10c15-10 25-8 31-2-14 0-23 4-31 12" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/><text x="50" y="87" text-anchor="middle" font-family="Arial" font-size="18" font-weight="900" fill="white">TSC</text></svg></div><div class="label">Tropical Smoothie</div></a>
<a class="app" href="https://www.mcdonalds.com/" target="_blank"><div class="icon mcd"><svg viewBox="0 0 100 100"><path d="M22 76c1-33 9-51 21-51 10 0 15 18 15 51M42 76c0-33 8-51 20-51 11 0 16 18 16 51" fill="none" stroke="#ffbc0d" stroke-width="10" stroke-linecap="round"/></svg></div><div class="label">McDonald’s</div></a>
<a class="app" href="https://www.starbucks.com/stores-and-ordering/" target="_blank"><div class="icon starbucks"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="32" fill="none" stroke="white" stroke-width="6"/><path d="M50 25l7 15 16 2-12 11 4 16-15-8-15 8 4-16-12-11 16-2z" fill="white"/></svg></div><div class="label">Starbucks</div></a>
</section>

<section class="page" data-name="Real Estate">
<a class="app" href="https://imagine.flexmls.com/" target="_blank"><div class="icon flex"><svg viewBox="0 0 100 100"><text x="50" y="58" text-anchor="middle" font-family="Arial" font-size="27" font-weight="800" fill="white">flex</text><text x="50" y="76" text-anchor="middle" font-family="Arial" font-size="15" fill="white">mls</text></svg></div><div class="label">Flexmls</div></a>
<a class="app" href="https://agent.showingtime.com/" target="_blank"><div class="icon showing"><svg viewBox="0 0 100 100"><text x="50" y="45" text-anchor="middle" font-family="Arial" font-size="18" font-weight="600" fill="white">Showing</text><text x="50" y="69" text-anchor="middle" font-family="Arial" font-size="24" font-weight="800" fill="white">Time</text></svg></div><div class="label">ShowingTime</div></a>
<a class="app" href="https://www.dotloop.com/" target="_blank"><div class="icon dotloop"><svg viewBox="0 0 100 100"><path d="M24 50c0-14 11-25 25-25 11 0 20 7 24 16" fill="none" stroke="#2aa4d6" stroke-width="8" stroke-linecap="round"/><path d="M76 50c0 14-11 25-25 25-11 0-20-7-24-16" fill="none" stroke="#2aa4d6" stroke-width="8" stroke-linecap="round"/><circle cx="50" cy="50" r="7" fill="#2aa4d6"/></svg></div><div class="label">Dotloop</div></a>
<a class="app" href="https://app.forewarn.com/" target="_blank"><div class="icon forewarn"><svg viewBox="0 0 100 100"><rect x="23" y="23" width="54" height="54" rx="13" fill="none" stroke="white" stroke-width="6"/><text x="50" y="61" text-anchor="middle" font-family="Arial" font-size="28" font-weight="900" fill="white">FW</text></svg></div><div class="label">FOREWARN</div></a>
<a class="app" href="https://www.zillow.com/" target="_blank"><div class="icon zillow"><svg viewBox="0 0 100 100"><path d="M24 39l26-17 26 17-26 17z" fill="white"/><path d="M28 64l45-28M30 77h43" stroke="white" stroke-width="8" stroke-linecap="round"/></svg></div><div class="label">Zillow</div></a>
<a class="app" href="https://exitrealty.com/" target="_blank"><div class="icon exit"><svg viewBox="0 0 100 100"><path d="M18 30h64M18 70h64" stroke="#1d75b9" stroke-width="8"/><text x="50" y="59" text-anchor="middle" font-family="Arial" font-size="28" font-weight="900" fill="#d71920">EXIT</text></svg></div><div class="label">EXIT Realty Connect</div></a>
</section>

<section class="page" data-name="Favorites"><div class="empty-note">Favorites is intentionally empty.<br>Nothing goes here until you ask for it.</div></section>
</main>

<div class="dots"><button class="dot active"></button><button class="dot"></button><button class="dot"></button><button class="dot"></button></div>
<div class="swipe">Swipe left or right</div>
</div>

<script>
const carousel=document.getElementById('carousel'),pages=[...document.querySelectorAll('.page')],dots=[...document.querySelectorAll('.dot')];
function clock(){const d=new Date(),h=d.getHours();greeting.textContent=(h<12?'Good morning':h<17?'Good afternoon':'Good evening')+', Coach Don';time.textContent=d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});date.textContent=d.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'})}
clock();setInterval(clock,1000);
function weatherIcon(c,d){if(c===0)return d?'☀️':'🌙';if([1,2].includes(c))return d?'⛅':'☁️';if(c===3)return'☁️';if([45,48].includes(c))return'🌫️';if([51,53,55,61,63,65,80,81,82].includes(c))return'🌧️';if([71,73,75,77,85,86].includes(c))return'❄️';if([95,96,99].includes(c))return'⛈️';return'🌤️'}
function weatherText(c){if(c===0)return'Clear';if([1,2].includes(c))return'Partly cloudy';if(c===3)return'Cloudy';if([45,48].includes(c))return'Foggy';if([51,53,55].includes(c))return'Drizzle';if([61,63,65,80,81,82].includes(c))return'Rain';if([71,73,75,77,85,86].includes(c))return'Snow';if([95,96,99].includes(c))return'Storms';return'Forecast'}
fetch('https://api.open-meteo.com/v1/forecast?latitude=38.2004&longitude=-84.8776&current=temperature_2m,weather_code,is_day&temperature_unit=fahrenheit&timezone=America%2FNew_York',{cache:'no-store'}).then(r=>r.json()).then(j=>{const c=j.current.weather_code;wxtemp.textContent=Math.round(j.current.temperature_2m)+'°';wxicon.textContent=weatherIcon(c,j.current.is_day);wxtext.textContent=weatherText(c)}).catch(()=>{wxtemp.textContent='Forecast';wxicon.textContent='🌤️';wxtext.textContent=''});
function showPage(i){carousel.scrollTo({left:i*carousel.clientWidth,behavior:'smooth'})}
document.querySelectorAll('[data-page]').forEach(b=>b.onclick=()=>showPage(+b.dataset.page));dots.forEach((d,i)=>d.onclick=()=>showPage(i));
function updatePage(){const i=Math.max(0,Math.min(pages.length-1,Math.round(carousel.scrollLeft/carousel.clientWidth)));pageName.textContent=pages[i].dataset.name;dots.forEach((d,n)=>d.classList.toggle('active',n===i))}
carousel.addEventListener('scroll',()=>requestAnimationFrame(updatePage));
</script>
</body></html>
