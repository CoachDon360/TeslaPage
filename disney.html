<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#8fd7ff">
  <title>AtMOUSEpheres</title>
  <link rel="stylesheet" href="disney.css">
</head>
<body>
  <main class="page-shell">
    <div class="sky-decor" aria-hidden="true">
      <span class="cloud cloud-one"></span>
      <span class="cloud cloud-two"></span>
      <span class="cloud cloud-three"></span>
      <span class="sparkle sparkle-one">✦</span>
      <span class="sparkle sparkle-two">✧</span>
    </div>

    <header class="hero">
      <div class="brand">
        <p class="tagline">A little getaway for your ears</p>
        <h1 aria-label="AtMOUSEpheres">
          <span>At</span><span class="mouse-word">m<span class="ear-o">o</span>use</span><span>pheres</span>
        </h1>
      </div>

      <div class="castle" aria-hidden="true">
        <span class="tower t1"><i></i></span>
        <span class="tower t2"><i></i></span>
        <span class="tower t3"><i></i></span>
        <span class="tower t4"><i></i></span>
        <span class="castle-base"></span>
      </div>

      <div class="time-panel">
        <span id="clock">--:--</span>
        <a class="home-link" href="index.html" aria-label="Return home">⌂ Home</a>
      </div>
    </header>

    <section class="destination-grid" aria-label="Disney audio destinations">
      <button class="destination-card parks selected"
        data-title="Around the Parks"
        data-subtitle="Music and ambience from all four parks"
        data-icon="🚂">
        <span class="scene scene-parks" aria-hidden="true">
          <span class="station-building"></span>
          <span class="train">🚂</span>
        </span>
        <span class="icon-badge">🚂</span>
        <strong>Around<br>the Parks</strong>
      </button>

      <button class="destination-card resorts"
        data-title="Resort Collection"
        data-subtitle="Relaxing music from Disney resort destinations"
        data-icon="🌴">
        <span class="scene scene-resorts" aria-hidden="true">
          <span class="resort-building"></span>
          <span class="palm p1">🌴</span><span class="palm p2">🌴</span>
          <span class="water"></span>
        </span>
        <span class="icon-badge">🌴</span>
        <strong>Resort<br>Collection</strong>
      </button>

      <button class="destination-card epcot"
        data-title="EPCOT Promenade"
        data-subtitle="World Showcase and futuristic favorites"
        data-icon="◉">
        <span class="scene scene-epcot" aria-hidden="true">
          <span class="epcot-ball"></span>
          <span class="fountain">⋰⋱</span>
        </span>
        <span class="icon-badge epcot-icon">◉</span>
        <strong>EPCOT<br>Promenade</strong>
      </button>

      <button class="destination-card atmospheres"
        data-title="Park Atmospheres"
        data-subtitle="Immersive area loops from around the parks"
        data-icon="🌳">
        <span class="scene scene-atmospheres" aria-hidden="true">
          <span class="life-tree">🌳</span>
          <span class="falls"></span>
        </span>
        <span class="icon-badge">🌳</span>
        <strong>Park<br>Atmospheres</strong>
      </button>

      <button class="destination-card attractions"
        data-title="Attraction Adventures"
        data-subtitle="Ride audio and queue-music favorites"
        data-icon="🎢">
        <span class="scene scene-attractions" aria-hidden="true">
          <span class="coaster">〰〰〰</span>
          <span class="sun"></span>
        </span>
        <span class="icon-badge">🎢</span>
        <strong>Attraction<br>Adventures</strong>
      </button>

      <button class="destination-card loops"
        data-title="Disney Loops"
        data-subtitle="Instrumental loops and park background music"
        data-icon="♫">
        <span class="scene scene-loops" aria-hidden="true">
          <span class="notes">♪ ♫ ♬</span>
          <span class="music-swoop"></span>
        </span>
        <span class="icon-badge">♫</span>
        <strong>Disney<br>Loops</strong>
      </button>

      <button class="destination-card nighttime"
        data-title="Nighttime Spectaculars"
        data-subtitle="Fireworks, shows and nighttime audio"
        data-icon="✦">
        <span class="scene scene-night" aria-hidden="true">
          <span class="firework f1">✺</span>
          <span class="firework f2">✹</span>
          <span class="mini-castle">♜</span>
        </span>
        <span class="icon-badge">✦</span>
        <strong>Nighttime<br>Spectaculars</strong>
      </button>

      <button class="destination-card seasonal"
        data-title="Seasonal Magic"
        data-subtitle="Holiday and seasonal park music"
        data-icon="❄">
        <span class="scene scene-seasonal" aria-hidden="true">
          <span class="snowflakes">❄　❅　❆</span>
          <span class="winter-village">⌂　⌂　⌂</span>
        </span>
        <span class="icon-badge">❄</span>
        <strong>Seasonal<br>Magic</strong>
      </button>
    </section>

    <section class="player" aria-label="Audio player">
      <div class="album-art" id="albumArt">🚂</div>
      <div class="now-playing">
        <span class="now-label">Now selected</span>
        <strong id="nowTitle">Around the Parks</strong>
        <span id="nowSubtitle">Music and ambience from all four parks</span>
      </div>
      <div class="transport">
        <button id="previousButton" aria-label="Previous destination">◀</button>
        <button id="playButton" class="play" aria-label="Play">▶</button>
        <button id="nextButton" aria-label="Next destination">▶</button>
      </div>
      <label class="volume">
        <span>🔊</span>
        <input type="range" min="0" max="100" value="65" aria-label="Volume">
      </label>
    </section>
  </main>

  <script src="disney.js"></script>
</body>
</html>
