<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#03142e">
  <title>Atmousepheres</title>
  <link rel="stylesheet" href="atmousepheres-split.css?v=1.2.0">
</head>
<body>
  <main class="app-shell">
    <section class="launcher-panel" aria-label="Disney radio channels">
      <header class="brand-lockup">
        <h1><span>At</span><strong>mouse</strong><span>pheres</span></h1>
        <p>A little getaway for your ears</p>
      </header>

      <div class="station-grid" id="stationGrid"></div>

      <footer class="left-footer">
        <time id="clock">--:--</time>
      </footer>
    </section>

    <section class="player-panel" aria-label="Now playing">
      <div class="scene" id="scene" aria-hidden="true">
        <div class="stars"></div>
        <div class="epcot-glow"></div>
        <div class="spaceship-earth">
          <div class="sphere-facets"></div>
        </div>
        <div class="monorail-beam"></div>
        <div class="reflection"></div>
      </div>

      <header class="player-header">
        <span class="live-pill"><b></b> LIVE</span>
        <img id="networkLogo" src="sorcerer-radio-icon.png" alt="Sorcerer Radio">
      </header>

      <div class="station-heading">
        <h2 id="stationTitle">Sorcerer Radio</h2>
        <p id="stationDescription">All Disney music, all day long</p>
      </div>

      <section class="now-playing-card">
        <div>
          <span class="eyebrow">NOW PLAYING</span>
          <strong id="trackTitle">Sorcerer Radio</strong>
          <small id="trackSubtitle">Tap Play to begin</small>
        </div>
        <img id="albumArt" class="album-art" src="sorcerer-radio-icon.png" alt="">
      </section>

      <div class="transport">
        <button id="previousButton" type="button" aria-label="Previous station">|◀</button>
        <button id="playButton" class="play-button" type="button" aria-label="Play">▶</button>
        <button id="nextButton" type="button" aria-label="Next station">▶|</button>
      </div>

      <div id="statusMessage" class="status-message" aria-live="polite"></div>
      <audio id="audioPlayer" preload="none"></audio>
    </section>
  </main>

  <script src="atmousepheres-split.js?v=1.2.0"></script>
</body>
</html>
